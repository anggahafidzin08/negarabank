# databricks.yml - Main DAB configuration

bundle:
  name: negarabank-pipeline


variables:
  databricks_host:
    description: Dev Databricks workspace URL
    default: https://dbc-d2fb7e57-7756.cloud.databricks.com/

  databricks_host_prod:
    description: Prod Databricks workspace URL
    default: https://your-workspace-prod.cloud.databricks.com

targets:
  dev:
    workspace:
      host: https://dbc-d2fb7e57-7756.cloud.databricks.com/

  prod:
    workspace:
      host: ${var.databricks_host_prod}
      
include:
  - resources/*.yml

# Resources are imported from separate files in the resources/ directory
# - resources/clusters.yml: Batch and streaming cluster definitions
# - resources/batch_etl_job.yml: Daily batch ETL pipeline (Bronze → Silver → Gold)
# - resources/fraud_detection_job.yml: 24/7 fraud detection streaming job

# Permissions & ACLs (Workspace-level scope)
# These permissions apply at the workspace level to all bundle resources
permissions:
  - level: CAN_MANAGE
    group_name: data-engineering-team
  - level: CAN_RUN
    group_name: data-analytics-team
  - level: CAN_VIEW
    group_name: business-analysts
