# Fraud Detection Streaming Job: Kafka → Real-time Fraud Alerts
# Schedule: 24/7 continuous (always running)
# Latency SLA: 10-15 seconds (event → alert)

resources:
  fraud_detection_job:
    type: jobs
    definition:
      name: Real-time Fraud Detection (24/7 Streaming)
      description: Continuous Kafka consumer for mobile events with fraud scoring
      deployment:
        kind: COMPLETE
      trigger:
        pause_status: UNPAUSED
      tasks:
        - task_key: fraud_streaming
          spark_python_task:
            python_file: ${bundle.root_path}/src/notebooks/streaming/fraud_detection_job.py
          cluster_id: ${resources.streaming_cluster.cluster_id}
          timeout_seconds: 86400  # 24 hours (continuous job)
