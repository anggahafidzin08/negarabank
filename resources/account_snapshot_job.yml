resources:
  jobs:
    account_snapshot_job:
      name: Account Daily Snapshot + Credit Scoring Pipeline
      description: Builds account_daily_snapshot from fact_transactions, then triggers credit scoring

      job_clusters:
        - job_cluster_key: snapshot_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: i3en.3xlarge
            num_workers: 2
            aws_attributes:
              availability: SPOT
              zone_id: ap-southeast-1a
            spark_conf:
              spark.sql.adaptive.enabled: "true"
              spark.sql.adaptive.coalescePartitions.enabled: "true"
              spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
              spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog

      tasks:
        - task_key: build_account_daily_snapshot
          job_cluster_key: snapshot_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "account_daily_snapshot"]
          depends_on: []
          timeout_seconds: 3600

        # Placeholder: credit scoring reads account_daily_snapshot as feature input
        # and writes predictions back to a credit_scores Gold table or Feature Store
        - task_key: credit_scoring_pipeline
          job_cluster_key: snapshot_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/credit_scoring_pipeline.py
          depends_on:
            - task_key: build_account_daily_snapshot
          timeout_seconds: 3600
