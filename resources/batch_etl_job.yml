# Batch ETL Job: Oracle → Bronze → Silver → Gold medallion pipeline
# Schedule: 2 AM UTC daily | Expected Duration: 15-30 minutes
# Cluster: ephemeral job_cluster (spins up/down per run — cost efficient)

resources:
  jobs:
    batch_etl_job:
      name: Daily Batch ETL (Oracle → Bronze → Silver → Gold)
      description: Extract from Oracle, transform, load to medallion layers
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: UTC

      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: i3en.3xlarge
            num_workers: 2
            aws_attributes:
              availability: SPOT
              zone_id: ap-southeast-1a
            spark_conf:
              spark.sql.adaptive.enabled: "true"
              spark.sql.adaptive.coalescePartitions.enabled: "true"
              spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
              spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog

      tasks:
        # ===== BRONZE LAYER: Extract (single script, table driven by --table arg) =====
        - task_key: extract_accounts
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "ACCOUNTS"
          timeout_seconds: 1800

        - task_key: extract_transactions
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "TRANSACTIONS"
          depends_on:
            - task_key: extract_accounts
          timeout_seconds: 3600

        - task_key: extract_credit_scores
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "CUSTOMERS"
          timeout_seconds: 1800

        - task_key: extract_tickets
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "SUPPORT_TICKETS"
          timeout_seconds: 1800

        # ===== SILVER LAYER: Transform & Curate (SCD2) =====
        - task_key: transform_accounts
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/silver_transformer.py
            parameters:
              - "--table"
              - "accounts"
          depends_on:
            - task_key: extract_accounts
          timeout_seconds: 1800

        - task_key: transform_transactions
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/silver_transformer.py
            parameters:
              - "--table"
              - "transactions"
          depends_on:
            - task_key: extract_transactions
            - task_key: transform_accounts
          timeout_seconds: 1800

        # ===== GOLD LAYER: Dimensions =====
        - task_key: build_dim_customer
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/01_build_dim_customer
          depends_on:
            - task_key: transform_accounts
          timeout_seconds: 1800

        - task_key: build_dim_account
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/02_build_dim_account
          depends_on:
            - task_key: transform_accounts
          timeout_seconds: 1800

        - task_key: build_dim_date
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/03_build_dim_date
          depends_on:
            - task_key: transform_transactions
          timeout_seconds: 1800

        - task_key: build_dim_event_type
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/04_build_dim_event_type
          depends_on:
            - task_key: transform_transactions
          timeout_seconds: 1800

        # ===== GOLD LAYER: Facts =====
        - task_key: build_fact_transactions
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/05_build_fact_transactions
          depends_on:
            - task_key: build_dim_customer
            - task_key: build_dim_account
            - task_key: build_dim_date
            - task_key: transform_transactions
          timeout_seconds: 1800

        - task_key: build_fact_mobile_events
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/06_build_fact_mobile_events
          depends_on:
            - task_key: build_dim_customer
            - task_key: build_dim_event_type
            - task_key: build_dim_date
          timeout_seconds: 1800

        - task_key: build_fact_fraud_risk
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/notebooks/gold/07_build_fact_fraud_risk
          depends_on:
            - task_key: build_fact_transactions
            - task_key: build_dim_customer
          timeout_seconds: 1800
