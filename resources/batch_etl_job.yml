# Batch ETL Job: Oracle → Bronze → Silver → Gold medallion pipeline
# Schedule: 2 AM Asia/Jakarta daily | Expected Duration: 15-30 minutes
# Cluster: ephemeral job_cluster (spins up/down per run — cost efficient)

resources:
  jobs:
    batch_etl_job:
      name: Daily Batch ETL (Oracle → Bronze → Silver → Gold)
      description: Extract from Oracle, transform, load to medallion layers
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: Asia/Jakarta
        pause_status: PAUSED  # Start in paused state to avoid unintended runs during setup

      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: i3en.3xlarge
            num_workers: 2
            aws_attributes:
              availability: SPOT
              zone_id: ap-southeast-1a
            spark_conf:
              spark.sql.adaptive.enabled: "true"
              spark.sql.adaptive.coalescePartitions.enabled: "true"
              spark.sql.extensions: io.delta.sql.DeltaSparkSessionExtension
              spark.sql.catalog.spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog

      tasks:
        # ===== BRONZE LAYER: Extract (single script, table driven by --table arg) =====
        - task_key: extract_accounts
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "ACCOUNTS"
          timeout_seconds: 1800

        - task_key: extract_transactions
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "TRANSACTIONS"
          timeout_seconds: 3600

        - task_key: extract_credit_scores
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "CUSTOMERS"
          timeout_seconds: 1800

        - task_key: extract_tickets
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/bronze_extractor.py
            parameters:
              - "--table"
              - "SUPPORT_TICKETS"
          timeout_seconds: 1800

        # ===== SILVER LAYER: Transform & Curate (SCD2) =====
        - task_key: transform_accounts
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/silver_transformer.py
            parameters:
              - "--table"
              - "accounts"
          depends_on:
            - task_key: extract_accounts
          timeout_seconds: 1800

        - task_key: transform_transactions
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/silver_transformer.py
            parameters:
              - "--table"
              - "transactions"
          depends_on:
            - task_key: extract_transactions
            - task_key: transform_accounts
          timeout_seconds: 1800

        # ===== GOLD LAYER: Dimensions (full_refresh, parallel after Silver) =====
        - task_key: build_dim_customer
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "dim_customer"]
          depends_on:
            - task_key: transform_accounts
          timeout_seconds: 1800

        - task_key: build_dim_account
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "dim_account"]
          depends_on:
            - task_key: transform_accounts
          timeout_seconds: 1800

        - task_key: build_dim_date
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "dim_date"]
          depends_on:
            - task_key: transform_transactions
          timeout_seconds: 900

        # ===== GOLD LAYER: Facts (incremental_merge) =====
        - task_key: build_fact_transactions
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "fact_transactions"]
          depends_on:
            - task_key: build_dim_customer
            - task_key: build_dim_account
            - task_key: build_dim_date
            - task_key: transform_transactions
          timeout_seconds: 3600

        - task_key: build_fact_fraud_risk
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "fact_fraud_risk"]
          depends_on:
            - task_key: build_fact_transactions
          timeout_seconds: 1800

        # ===== GOLD LAYER: OJK Regulatory Reports (incremental_merge) =====
        - task_key: build_customer_health_scorecard
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "customer_health_scorecard"]
          depends_on:
            - task_key: transform_accounts
            - task_key: transform_transactions
          timeout_seconds: 3600

        - task_key: build_fraud_detection_alerts
          job_cluster_key: batch_cluster
          spark_python_task:
            python_file: ${workspace.file_path}/src/python/gold_builder.py
            parameters: ["--table", "fraud_detection_alerts"]
          depends_on:
            - task_key: transform_transactions
            - task_key: transform_accounts
          timeout_seconds: 3600

        - task_key: account_snapshot_trigger
          run_job_task:
            job_id: ${resources.jobs.account_snapshot_job.id}
          depends_on:
            - task_key: build_dim_account
            - task_key: build_fact_transactions
          timeout_seconds: 1800