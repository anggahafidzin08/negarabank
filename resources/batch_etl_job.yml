# Batch ETL Job: Oracle → Bronze → Silver → Gold medallion pipeline
# Schedule: 2 AM UTC daily
# Expected Duration: 15-30 minutes

resources:
  batch_etl_job:
    type: jobs
    definition:
      name: Daily Batch ETL (Oracle → Bronze → Silver → Gold)
      description: Extract from Oracle, transform, load to medallion layers
      schedule:
        quartz_cron_expression: 0 0 2 * * ?  # 2 AM daily
        timezone_id: UTC

      # Error Handling Strategy:
      # - Timeout: 1800s (30m) for quick extracts, 3600s (60m) for large transaction tables
      # - Retry: Default 3 attempts per task on transient failures
      # - Alerting: Job failures trigger #data-eng-alerts Slack channel notification

      tasks:
        # ===== BRONZE LAYER: Extract =====
        - task_key: extract_accounts
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/bronze/01_extract_oracle_accounts
          cluster_id: ${resources.batch_cluster.cluster_id}
          timeout_seconds: 1800

        - task_key: extract_transactions
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/bronze/02_extract_oracle_transactions
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - extract_accounts
          timeout_seconds: 3600

        - task_key: extract_credit_scores
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/bronze/03_extract_oracle_credit_scores
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - extract_accounts
          timeout_seconds: 1800

        - task_key: extract_tickets
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/bronze/04_extract_oracle_tickets
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - extract_accounts
          timeout_seconds: 1800

        # ===== SILVER LAYER: Transform & Curate =====
        - task_key: transform_accounts
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/silver/01_transform_accounts
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - extract_accounts
          timeout_seconds: 1800

        - task_key: transform_transactions
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/silver/02_transform_transactions
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - extract_transactions
            - transform_accounts
          timeout_seconds: 1800

        # ===== GOLD LAYER: Dimensional & Fact Tables =====
        - task_key: build_dim_customer
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/01_build_dim_customer
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - transform_accounts
          timeout_seconds: 1800

        - task_key: build_dim_account
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/02_build_dim_account
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - transform_accounts
          timeout_seconds: 1800

        - task_key: build_dim_date
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/03_build_dim_date
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - transform_transactions
          timeout_seconds: 1800

        - task_key: build_dim_event_type
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/04_build_dim_event_type
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - transform_transactions
          timeout_seconds: 1800

        - task_key: build_fact_transactions
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/05_build_fact_transactions
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - build_dim_customer
            - build_dim_account
            - build_dim_date
            - transform_transactions
          timeout_seconds: 1800

        - task_key: build_fact_mobile_events
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/06_build_fact_mobile_events
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - build_dim_customer
            - build_dim_event_type
            - build_dim_date
          timeout_seconds: 1800

        - task_key: build_fact_fraud_risk
          notebook_task:
            notebook_path: ${bundle.root_path}/src/notebooks/gold/07_build_fact_fraud_risk
          cluster_id: ${resources.batch_cluster.cluster_id}
          depends_on:
            - build_fact_transactions
            - build_dim_customer
          timeout_seconds: 1800
