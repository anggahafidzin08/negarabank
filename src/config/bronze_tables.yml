tables:
  - name: ACCOUNTS
    bronze_table: accounts
    method: full_snapshot
    write_mode: overwrite

  - name: CUSTOMERS
    bronze_table: customers
    method: full_snapshot
    write_mode: overwrite

  - name: TRANSACTIONS
    bronze_table: transactions
    method: delta_load
    write_mode: append
    timestamp_column: txn_date
    predicate_slices: 4
    checkpoint_buffer_hours: 12  # re-reads last checkpoint - 12h to catch late arrivals

  - name: CUSTOMERS
    bronze_table: customers
    method: full_snapshot
    write_mode: overwrite

  - name: SUPPORT_TICKETS
    bronze_table: support_tickets
    method: full_snapshot
    write_mode: overwrite
